# gitmsyncd instance — generated by Fleet or configured manually
# Copy this file, edit the environment, run: podman-compose up -d
#
# Fleet generates this with instance-specific values pre-filled.

services:
  db:
    image: docker.io/library/postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: gitmsyncd
      POSTGRES_USER: gitmsyncd
      POSTGRES_PASSWORD: changeme  # Fleet fills this
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gitmsyncd"]
      interval: 5s
      timeout: 5s
      retries: 5

  gitmsyncd:
    image: registry.decllc.biz/gitmsyncd:0.3.0  # Fleet fills registry URL
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "9097:9097"  # Fleet assigns unique port per instance
    environment:
      GITMSYNCD_DSN: "dbi:Pg:dbname=gitmsyncd;host=db;port=5432"
      GITMSYNCD_DB_USER: gitmsyncd
      GITMSYNCD_DB_PASS: changeme  # must match db service
      GITMSYNCD_LISTEN: "http://0.0.0.0:9097"
      GITMSYNCD_WORKDIR: /var/lib/gitmsyncd/workdir
      GITMSYNCD_WORKER_SET: default  # Fleet fills with set name
      GITMSYNCD_MAX_FORKS: 4
      GITMSYNCD_MAX_LOAD: 3.2
      GITMSYNCD_MIN_MEM_MB: 256
      GITMSYNCD_MIN_DISK_MB: 1024
    volumes:
      - workdir:/var/lib/gitmsyncd/workdir

volumes:
  pgdata:
  workdir:
